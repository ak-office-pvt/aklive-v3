<!doctype html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">

  <link rel="shortcut icon" href="/favicon.ico"/>
  <meta name="theme-color" content="#161616">

  <!-- DYNAMIC TITLE -->
  <title>Loading Channel...</title>

  <!-- FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- SHAKA PLAYER -->
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.16.2/controls.min.css">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.16.2/shaka-player.ui.min.js"></script>

  <!-- EXTRA -->
  <script src="/js/click-heart.js"></script>

  <!-- DISABLE DEVTOOLS -->
  <script
    disable-devtool-auto='true'
    src='https://cdn.jsdelivr.net/npm/disable-devtool'
    clear-log='true'
    disable-select='true'
    disable-copy='true'
    disable-cut='true'
    disable-paste='true'>
  </script>

  <style>

    :root{
      --theme-color:#ffcc00;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html,
    body{
      width:100%;
      height:100%;
      background:#000;
      overflow:hidden;
      font-family:'Poppins',sans-serif;
    }

    /* PLAYER */

    .shaka-video-container{
      position:fixed;
      inset:0;

      background:#000;

      display:flex;
      align-items:center;
      justify-content:center;
    }

    video{
      width:100%;
      height:100%;
      object-fit:contain;
      background:#000;
      outline:none;
      transition:.2s ease;
    }

    /* CHANNEL LOGO */

    .channel-logo{
    position:absolute;

    top:3vw;
    left:3vw;

    width:34vw;
    min-width:65px;
    max-width:140px;

    z-index:9999;

    pointer-events:none;

    filter: drop-shadow(0 0 6px rgba(0,0,0,1.5));
}

    /* STATUS BOX */

    #debug-status{

      position:absolute;

      top:50%;
      left:50%;

      transform:translate(-50%,-50%);

      z-index:50;

      color:#fff;

      background:rgba(20,20,20,0.95);

      padding:15px 25px;

      font-size:14px;
      font-weight:500;

      border-radius:8px;

      opacity:0;
      visibility:hidden;

      text-align:center;

      transition:opacity .3s ease;
    }

    #debug-status.show{
      opacity:1;
      visibility:visible;
    }

    #debug-status.error{
      border-bottom:3px solid #ff4444;
    }

    #debug-status.success{
      border-bottom:3px solid #00C851;
    }

    #debug-status.info{
      border-bottom:3px solid #33b5e5;
    }

    #debug-status.loading{
      border-bottom:3px solid var(--theme-color);
    }

    /* SVG RESIZE BUTTON */

    .resize-btn{

      width:34px;
      height:34px;

      display:flex;
      align-items:center;
      justify-content:center;

      background:none;
      border:none;

      cursor:pointer;

      margin-left:8px;
    }

    .resize-btn svg{

      width:22px;
      height:22px;

      fill:#fff;

      opacity:.9;

      transition:.2s ease;
    }

    .resize-btn:hover svg{

      opacity:1;

      transform:scale(1.08);
    }

  </style>

</head>

<body>

  <!-- PLAYER -->

  <div class="shaka-video-container" id="player-container">

    <!-- STATUS -->

    <div id="debug-status" class="loading">
      Initializing...
    </div>

    <!-- VIDEO -->

    <video
      id="video"
      autoplay
      playsinline
      preload="metadata">
    </video>

    <!-- LOGO -->

    <img
      src="//aklive-v3.pages.dev/images/logo.png"
      class="channel-logo"
      alt="Logo">

  </div>

  <script>

    // =========================
    // CONFIG
    // =========================

    const CHANNELS_JSON_URL =
      "https://binge-giotv.pages.dev/data/id.json";

    const statusEl =
      document.getElementById('debug-status');

    function updateStatus(msg, type='info'){

      statusEl.innerText = msg;

      statusEl.className = `show ${type}`;

      console.log(`[${type.toUpperCase()}] ${msg}`);
    }

    // =========================
    // FETCH CONFIG
    // =========================

    async function fetchConfig(){

      const urlParams =
        new URLSearchParams(window.location.search);

      let streamUrls = [];

      let keyId = "";
      let key = "";

      const targetId =
        urlParams.get('id') || 'ss1h';

      updateStatus(
        "Fetching Channel Data...",
        "loading"
      );

      try{

        const channelRes =
          await fetch(CHANNELS_JSON_URL);

        const data =
          await channelRes.json();

        const channelList =
          data.channels;

        let channelData =
          channelList.find(
            c => String(c.id) === String(targetId)
          );

        if(channelData){

          /* PAGE TITLE */

          document.title =
            channelData.name +
            " | AK LIVE";

          streamUrls =
            [channelData.url].filter(Boolean);

          keyId =
            channelData.keyId || "";

          key =
            channelData.key || "";

          let cookiesList =
            channelData.cookie
            ? [channelData.cookie]
            : [""];

          return{

            streamUrls,
            keyId,
            key,
            cookiesList,
            activeCookie:""
          };
        }

      }catch(e){

        console.error(
          "Error fetching channel JSON",
          e
        );
      }

      updateStatus(
        "Error: Channel ID not found!",
        "error"
      );

      return false;
    }

    // =========================
    // START PLAYER
    // =========================

    document.addEventListener(
      'DOMContentLoaded',
      async()=>{

      const STREAM_CONFIG =
        await fetchConfig();

      if(!STREAM_CONFIG) return;

      shaka.polyfill.installAll();

      const videoEl =
        document.getElementById('video');

      const container =
        document.getElementById('player-container');

      // PLAYER

      window.player =
        new shaka.Player(videoEl);

      // UI

      const ui =
        new shaka.ui.Overlay(
          window.player,
          container,
          videoEl
        );

      // PLAYER CONTROLS

      ui.configure({

        controlPanelElements:[

          "mute",
          "play_pause",
          "time_and_duration",
          "spacer",

          /* CUSTOM BUTTON */

          "picture_in_picture",

          "quality",

          "fullscreen"
        ],

        // SEEK BAR COLORS

        seekBarColors: {

          base: "rgba(255,255,255,0.25)",

          buffered: "rgba(243, 255, 15,0.45)",

          played: "#f3ff0f"
        }
      });

      // =========================
      // VIDEO RESIZE MODES
      // =========================

      const resizeModes = [

        "fill",
        "contain",
        "cover"
      ];

      let currentResize = -1;

      // CREATE BUTTON

      const resizeBtn =
        document.createElement("button");

      resizeBtn.className =
        "resize-btn";

      // SVG ICONS

      const resizeIcons = [

        // FILL
        `
        <svg viewBox="0 0 24 24">
          <path d="M3 5h18v14H3V5zm2 2v10h14V7H5z"/>
        </svg>
        `,

        // FIT
        `
        <svg viewBox="0 0 24 24">
          <path d="M4 4h6v2H6v4H4V4zm10 0h6v6h-2V6h-4V4zM4 14h2v4h4v2H4v-6zm14 4v-4h2v6h-6v-2h4z"/>
        </svg>
        `,

        // COVER
        `
        <svg viewBox="0 0 24 24">
          <path d="M4 6h16v12H4z"/>
        </svg>
        `
      ];

      // DEFAULT ICON

      resizeBtn.innerHTML =
        resizeIcons[0];

      // CLICK EVENT

      resizeBtn.addEventListener(
        "click",
        ()=>{

        currentResize++;

        if(
          currentResize >=
          resizeModes.length
        ){

          currentResize = 0;
        }

        videoEl.style.objectFit =
          resizeModes[currentResize];

        resizeBtn.innerHTML =
          resizeIcons[currentResize];
      });

      // ADD BUTTON BEFORE QUALITY

      setTimeout(()=>{

        const controls =
          document.querySelector(
            ".shaka-controls-button-panel"
          );

        if(controls){

          const qualityBtn =
            controls.querySelector(
              ".shaka-resolution-button"
            );

          if(qualityBtn){

            controls.insertBefore(
              resizeBtn,
              qualityBtn
            );

          }else{

            controls.appendChild(
              resizeBtn
            );
          }
        }

      },1000);

      // PLAYER CONFIG

      const playerConfig = {

        streaming:{
          lowLatencyMode:true,
          bufferingGoal:5
        }
      };

      // DRM

      if(
        STREAM_CONFIG.keyId &&
        STREAM_CONFIG.key
      ){

        playerConfig.drm = {

          clearKeys:{
            [STREAM_CONFIG.keyId]:
            STREAM_CONFIG.key
          }
        };
      }

      window.player.configure(playerConfig);

      // REQUEST FILTER

      window.player
        .getNetworkingEngine()
        .registerRequestFilter(
          (type,request)=>{

          request.headers['Referer'] =
            'https://www.jiotv.com/';

          request.headers['User-Agent'] =
            'plaYtv/7.1.5 (Linux;Android 13) ExoPlayerLib/2.11.6';

          if(

            STREAM_CONFIG.activeCookie &&

            (
              type === shaka.net.NetworkingEngine.RequestType.MANIFEST ||

              type === shaka.net.NetworkingEngine.RequestType.SEGMENT
            )
          ){

            const cleanUrl =
              request.uris[0].split('?')[0];

            request.uris[0] =
              cleanUrl +
              '?' +
              STREAM_CONFIG.activeCookie;
          }
        });

      let streamLoaded = false;

      let lastErrorCode =
        "Unknown Error";

      // LOAD STREAM

      for(
        let i=0;
        i<STREAM_CONFIG.streamUrls.length;
        i++
      ){

        const currentUrl =
          STREAM_CONFIG.streamUrls[i];

        for(
          let c=0;
          c<STREAM_CONFIG.cookiesList.length;
          c++
        ){

          STREAM_CONFIG.activeCookie =
            STREAM_CONFIG.cookiesList[c];

          try{

            updateStatus(
              `Testing Link ${i+1} with Token ${c+1}...`,
              "loading"
            );

            await window.player.load(currentUrl);

            const tracks =
              window.player
              .getVariantTracks()
              .sort(
                (a,b)=>
                a.bandwidth - b.bandwidth
              );

            if(tracks.length > 0){

              window.player.selectVariantTrack(
                tracks[0],
                true
              );

              window.player.configure({

                abr:{
                  enabled:true
                }
              });
            }

            videoEl.play();

            streamLoaded = true;

            updateStatus(
              "Live Stream Connected!",
              "success"
            );

            setTimeout(()=>{

              statusEl.classList.remove('show');

            },3000);

            break;

          }catch(e){

            lastErrorCode =
              e.code ||
              "Token Expired / CORS Error";
          }
        }

        if(streamLoaded) break;
      }

      // FAILED

      if(!streamLoaded){

        updateStatus(
          `Playback Failed. Code: ${lastErrorCode}`,
          "error"
        );
      }
    });

  </script>

</body>
</html>
