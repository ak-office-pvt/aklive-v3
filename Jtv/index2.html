.sx-app *{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

.sx-app{
  min-height:100vh;
  background:#181818;
  padding:30px;
  font-family:Inter,sans-serif;
  color:white;
}

.sx-topbar{
  width:100%;
  margin-bottom:30px;
}

.sx-heading{
  font-size:34px;
  font-weight:800;
  margin-bottom:20px;
  letter-spacing:1px;
  color:#fff;
}

.sx-search{
  width:100%;
  height:60px;
  border:none;
  outline:none;
  border-radius:18px;
  padding:0 24px;
  font-size:17px;
  color:white;
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.08);
  transition:0.3s;
}

.sx-search:focus{
  border-color:#efff45;
  box-shadow:0 0 20px rgba(241,255,87,0.25);
}

.sx-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:22px;
}

.sx-card{
  overflow:hidden;
  border-radius:24px;
  background:
  linear-gradient(
    180deg,
    rgba(255,255,255,0.08),
    rgba(255,255,255,0.01)
  );

  border:1.5px solid rgba(255,255,255,0.08);

  transition:0.4s;
  cursor:pointer;
}

.sx-card:hover{
  transform:translateY(-8px) scale(1.02);

  border-color:#daf63b;

  box-shadow:
  0 10px 35px rgba(0,0,0,0.45);
}

.sx-thumb{
  width:100%;
  height:150px;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

.sx-thumb img{
  width:100%;
  height:100%;
  object-fit:contain;
  padding:16px;
  transition:0.4s;
}

.sx-card:hover .sx-thumb img{
  transform:scale(1.08);
}

.sx-body{
  padding:16px;
}

.sx-name{
  font-size:16px;
  font-weight:700;
  line-height:1.4;
  color:#fff;
}

.sx-tag{
  margin-top:10px;
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:7px 12px;
  border-radius:999px;
  background:rgba(255,0,0,0.60);
  color:#fff;
  font-size:12px;
  font-weight:600;
}

.sx-empty{
  text-align:center;
  padding:60px;
  color:#9ca3af;
  font-size:18px;
}

.sx-loader{
  display:flex;
  justify-content:center;
  align-items:center;
  height:200px;
}

.sx-spinner{
  width:45px;
  height:45px;
  border-radius:50%;
  border:4px solid rgba(255,255,255,0.12);
  border-top-color:#daf63b;
  animation:sxSpin 1s linear infinite;
}

@keyframes sxSpin{
  to{
    transform:rotate(360deg);
  }
}

/* ========================= */
/* POPUP */
/* ========================= */

#popup{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.85);

  display:none;

  justify-content:center;
  align-items:center;

  z-index:99999;
}

.popup-content{

  width:320px;

  background:#1f1f1f;

  border-radius:20px;

  padding:25px;

  text-align:center;

  border:1px solid rgba(255,255,255,0.08);

  animation:popupAnim 0.35s ease;
}

@keyframes popupAnim{

  from{
    transform:scale(0.7);
    opacity:0;
  }

  to{
    transform:scale(1);
    opacity:1;
  }

}

.popup-content h2{
  color:#efff45;
  margin-bottom:15px;
  font-weight:800;
}

.popup-content p{

  margin-bottom:20px;

}

.popup-content button{

  padding:13px;

}

.join-btn{

.join-btn:hover{

.close-btn{

  color:white;

}

@media(max-width:600px){

    gap:16px;

  }

  }

<script>

const API_URL =
"https://binge-giotv.pages.dev/data/id.json";

const channelsWrap =
document.getElementById("sxChannels");

const searchInput =
document.getElementById("sxSearch");

let allChannels = [];

/* ========================= */
/* FETCH CHANNELS */
/* ========================= */

async function fetchChannels(){

  try{

    const response =
    await fetch(API_URL + "?t=" + Date.now());

    const data =
    await response.json();

    allChannels =
    data.channels || [];

    renderChannels(allChannels);

  }catch(error){

    channelsWrap.innerHTML = `
      <div class="sx-empty">
        Failed To Load Channels
      </div>
    `;

    console.log(error);

  }

}

/* ========================= */
/* RENDER CHANNELS */
/* ========================= */

function renderChannels(channels){

  if(!channels.length){

    channelsWrap.innerHTML = `
      <div class="sx-empty">
        No Channels Found
      </div>
    `;

    return;
  }

  channelsWrap.innerHTML =
  `<div class="sx-grid"></div>`;

  const grid =
  channelsWrap.querySelector(".sx-grid");

  channels.forEach(channel => {

    const card =
    document.createElement("div");

    card.className =
    "sx-card";

    card.innerHTML = `

      <div class="sx-thumb">

        <img
        src="${channel.logo}"
        loading="lazy"
        alt="${channel.name}"
        >

      </div>

      <div class="sx-body">

        <div class="sx-name">
          ${channel.name}
        </div>

        <div class="sx-tag">
          LIVE
        </div>

      </div>

    `;

    card.onclick = () => {

      const playerURL =
      `/Jtv/play?id=${channel.id}`;

      window.location.href =
      playerURL;

    };

    grid.appendChild(card);

  });

}

/* ========================= */
/* SEARCH */
/* ========================= */

searchInput.addEventListener(
"input",
function(){

  const value =
  this.value.toLowerCase();

  const filtered =
  allChannels.filter(ch =>
    ch.name.toLowerCase()
    .includes(value)
  );

  renderChannels(filtered);

});

/* ========================= */
/* AUTO REFRESH */
/* ========================= */

setInterval(() => {

  fetchChannels();

}, 300000);

/* ========================= */
/* POPUP FUNCTIONS */
/* ========================= */

function showPopup(){

  document.getElementById("popup")
  .style.display = "flex";

}

function closePopup(){

  document.getElementById("popup")
  .style.display = "none";

}

function joinTelegram(){

  window.open(
    "https://telegram.me/AK_LIVE_OFFICE",
    "_blank"
  );

  closePopup();

}

/* ========================= */
/* PAGE LOAD */
/* ========================= */

window.addEventListener(
"load",
() => {

  fetchChannels();

  // popup every visit
  setTimeout(() => {

    showPopup();

  }, 1500);

}
);
 
</script>
