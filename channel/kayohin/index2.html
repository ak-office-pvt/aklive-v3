<style>

/* ===================================== */
/* AK PLAYER UNIQUE CSS */
/* MAIN CSS SE MATCH NAHI HOGA */
/* ===================================== */

.akx-body{

    background:#202020;
    overflow-x:hidden;

}

/* TITLE */

.akx-player-title{

    text-align:center;

    color:#fff;

    font-size:24px;

    margin-top:25px;

    margin-bottom:20px;

    font-weight:700;

}

/* PLAYER WRAPPER */

.akx-video-wrapper{

    position:relative;

    width:100%;

    max-width:920px;

    margin:35px auto;

    padding:0 15px;

}

/* PLAYER BOX */

.akx-video-box{

    position:relative;

    width:100%;

    background:#111;

    border-radius:14px;

    overflow:hidden;

    box-shadow:
    0 0 25px rgba(0,0,0,0.5);

}

/* IFRAME */

.akx-video-frame{

    width:100%;

    height:50.625vw;

    max-height:520px;

    border:none;

    display:block;

    background:#000;

}

/* LOGO OVERLAY */

.akx-player-logo{

    position:absolute;

    top:18px;

    left:22px;

    z-index:999999;

    pointer-events:none;

}

.akx-player-logo img{

    width:120px;

    opacity:0.95;

    filter:drop-shadow(
    0 0 8px rgba(0,0,0,0.9));

}

/* FULLSCREEN SUPPORT */

.akx-video-box:fullscreen .akx-player-logo,
.akx-video-box:-webkit-full-screen .akx-player-logo,
.akx-video-box:-moz-full-screen .akx-player-logo,
.akx-video-box:-ms-fullscreen .akx-player-logo{

    position:fixed;

    top:20px;

    left:25px;

    z-index:2147483647;

}

/* FULLSCREEN VIDEO */

.akx-video-box:fullscreen .akx-video-frame,
.akx-video-box:-webkit-full-screen .akx-video-frame,
.akx-video-box:-moz-full-screen .akx-video-frame,
.akx-video-box:-ms-fullscreen .akx-video-frame{

    width:100vw;

    height:100vh;

    max-height:100vh;

    border-radius:0;

}

/* TELEGRAM BUTTON */

.akx-telegram-btn{

    display:inline-block;

    margin-top:20px;

    background:#0088cc;

    color:#fff;

    padding:13px 28px;

    border-radius:10px;

    font-size:16px;

    font-weight:700;

    text-decoration:none;

    transition:0.3s;

}

.akx-telegram-btn:hover{

    background:#0077b6;

    transform:scale(1.05);

    color:#fff;

    text-decoration:none;

}

/* POPUP */

#ak-popup{

    position:fixed;

    inset:0;

    width:100%;

    height:100%;

    background:rgba(0,0,0,0.82);

    backdrop-filter:blur(3px);

    display:none;

    justify-content:center;

    align-items:center;

    z-index:999999;

    animation:fadeIn .3s ease;

}

.ak-popup-box{

    width:340px;

    max-width:90%;

    background:linear-gradient(
    145deg,
    #242424,
    #1a1a1a);

    border-radius:28px;

    padding:30px;

    text-align:center;

    border:1px solid rgba(255,255,255,0.08);

    box-shadow:
    0 15px 50px rgba(0,0,0,0.5);

}

.ak-popup-box h2{

    color:#f1ff45;

    font-size:24px;

    margin-bottom:18px;

    font-weight:800;

}

.ak-popup-box p{

    color:#e0e0e0;

    font-size:16px;

    line-height:1.7;

    margin-bottom:28px;

}

.ak-popup-box button{

    width:100%;

    height:58px;

    border:none;

    border-radius:18px;

    font-size:17px;

    font-weight:700;

    cursor:pointer;

    transition:.3s;

    margin-top:14px;

}

.ak-join-btn{

    background:#1096db;

    color:#fff;

}

.ak-join-btn:hover{

    background:#0b84c5;

}

.ak-close-btn{

    background:#353535;

    color:#fff;

}

.ak-close-btn:hover{

    background:#454545;

}

/* MOBILE */

@media(max-width:768px){

    .akx-player-title{

        font-size:20px;

    }

    .akx-player-logo{

        top:14px;

        left:16px;

    }

    .akx-player-logo img{

        width:85px;

    }

}

/* ANIMATION */

@keyframes fadeIn{

    from{

        opacity:0;

    }

    to{

        opacity:1;

    }

}

</style>
