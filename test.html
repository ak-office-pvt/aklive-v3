<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stream Player</title>
   <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/shaka-player.ui.min.js" crossorigin="anonymous"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.11/controls.min.css" crossorigin="anonymous">
    <script disable-devtool-auto src='https://cdn.jsdelivr.net/npm/disable-devtool'></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: black;
            overflow: hidden;
        }

        #video-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 18px;
        }

        .error {
            color: #ff4444;
        }
    </style>
</head>
<body>
    <div id="video-container">
    <video
        id="video"
        autoplay
        playsinline
        preload="metadata"
        poster="https://i.ibb.co/3mPGnQs4/live-cricket-tournament-poster-1302-15524.avif">
    </video>
    <div id="loading">Loading player...</div>
    </div>

    <script>
        // Default fallback stream
        const FALLBACK_STREAM = "https://muh-me-lelo.me/lala.m3u8";

        async function initPlayer() {
            const video = document.getElementById('video');
            const uiContainer = document.getElementById('video-container');
            const loadingElement = document.getElementById('loading');

            // Initialize Shaka Player
            shaka.polyfill.installAll();
            const player = new shaka.Player(video);
            const ui = new shaka.ui.Overlay(player, uiContainer, video);

            // Enable HLS support
            player.configure({
    streaming: {
        lowLatencyMode: true,
        bufferingGoal: 1,
        rebufferingGoal: 1,
        bufferBehind: 1
    }
});

            try {
                // Check for stream ID parameter
                const urlParams = new URLSearchParams(window.location.search);
                const streamId = urlParams.get('id');

                let manifestUri;
                let drmConfig = {};

                if (streamId) {
                    // Fetch stream data
                    const response = await fetch('https://n-tau-murex.vercel.app/api/stream.json');
                    const streams = await response.json();
                    const stream = streams.find(s => s.id === streamId);

                    if (stream) {
                        if (stream.m3u8) {
                            // HLS stream configuration
                            manifestUri = stream.m3u8;
                            // Shaka Player automatically handles HLS
                        } else if (stream.mpd && stream.key) {
                            // DASH with ClearKey configuration
                            manifestUri = stream.mpd;
                            const [keyId, keyValue] = stream.key.split(':');
                            drmConfig = {
                                clearKeys: {
                                    [keyId.trim()]: keyValue.trim()
                                }
                            };
                        }
                    }
                }

                // If no valid stream found, use fallback
                if (!manifestUri) {
                    manifestUri = FALLBACK_STREAM;
                }

                // Apply DRM configuration if needed
                if (Object.keys(drmConfig).length > 0) {
                    player.configure({
                        drm: drmConfig
                    });
                }

                // Load the manifest
                await player.load(manifestUri);
                loadingElement.style.display = 'none';

            } catch (error) {
                console.error('Error:', error);
                loadingElement.className = 'error';
                loadingElement.textContent = 'Error loading stream';
                // Still try to play fallback
                try {
                    await player.load(FALLBACK_STREAM);
                    loadingElement.style.display = 'none';
                } catch (fallbackError) {
                    loadingElement.textContent = 'Failed to load any stream';
                }
            }
        }

        // Initialize when Shaka UI is loaded
        document.addEventListener('DOMContentLoaded', initPlayer);
        document.addEventListener('shaka-ui-load-failed', () => {
            document.getElementById('loading').className = 'error';
            document.getElementById('loading').textContent = 'Error loading player UI';
        });
    </script>
</body>
</html>
