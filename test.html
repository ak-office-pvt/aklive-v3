
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TSneh Link Shortner</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      background:#efefef;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
    }

    .container{
      width:100%;
      max-width:500px;
      text-align:center;
    }

    .logo{
      font-size:70px;
      font-weight:bold;
      color:#0066ff;
      margin-bottom:10px;
    }

    .logo span{
      color:#ff4d4d;
    }

    h1{
      font-size:58px;
      font-weight:800;
      margin-bottom:40px;
      color:black;
    }

    input{
      width:100%;
      padding:18px;
      margin-bottom:20px;
      border:3px solid #0066ff;
      border-radius:10px;
      font-size:22px;
      outline:none;
      background:transparent;
    }

    button{
      padding:16px 50px;
      border:3px solid #0066ff;
      border-radius:12px;
      background:white;
      font-size:24px;
      cursor:pointer;
      transition:0.3s;
      margin-top:10px;
    }

    button:hover{
      background:#0066ff;
      color:white;
    }

    .result{
      margin-top:35px;
      padding:20px;
      background:white;
      border-radius:12px;
      display:none;
    }

    .result a{
      color:#0066ff;
      font-size:20px;
      font-weight:bold;
      text-decoration:none;
      word-break:break-all;
    }

    .copy-btn{
      margin-top:15px;
      width:100%;
    }

    @media(max-width:600px){
      .logo{
        font-size:52px;
      }

      h1{
        font-size:40px;
      }

      input{
        font-size:18px;
      }

      button{
        font-size:20px;
      }
    }
  </style>
</head>
<body>

  <div class="container">

    <div class="logo">
      TSneh<span>,</span>
    </div>

    <h1>Link Shortner</h1>

    <input type="text" id="url" placeholder="Enter URL" />

    <input type="text" id="slug" placeholder="Custom Slug (Optional)" />

    <button onclick="generateLink()">Generate</button>

    <div class="result" id="resultBox">
      <p style="margin-bottom:15px;font-size:22px;font-weight:bold;">
        Short Link Generated
      </p>

      <a id="shortLink" href="#"></a>

      <button class="copy-btn" onclick="copyLink()">
        Copy Link
      </button>
    </div>

  </div>

  <script>

    // Redirect System
    const hash = window.location.hash.substring(1);

    if(hash){
      const links = JSON.parse(localStorage.getItem("shortLinks")) || {};

      if(links[hash]){
        window.location.href = links[hash];
      }
    }


    function generateRandomSlug(){
      return Math.random().toString(36).substring(2,8);
    }


    function generateLink(){

      const url = document.getElementById("url").value.trim();
      const customSlug = document.getElementById("slug").value.trim();

      if(url === ""){
        alert("Please enter URL");
        return;
      }

      let slug = customSlug || generateRandomSlug();

      let links = JSON.parse(localStorage.getItem("shortLinks")) || {};

      if(links[slug]){
        alert("Slug already exists. Try another.");
        return;
      }

      links[slug] = url;

      localStorage.setItem("shortLinks", JSON.stringify(links));

      const shortUrl = `${window.location.origin}${window.location.pathname}#${slug}`;

      document.getElementById("resultBox").style.display = "block";

      const shortLink = document.getElementById("shortLink");

      shortLink.href = shortUrl;
      shortLink.innerText = shortUrl;
    }


    function copyLink(){

      const link = document.getElementById("shortLink").innerText;

      navigator.clipboard.writeText(link);

      alert("Link Copied!");
    }

  </script>

</body>
</html>
