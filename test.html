<!doctype html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <link rel="shortcut icon" href="/favicon.ico" />
  <meta name="theme-color" content="#161616">
 
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.16.2/controls.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.16.2/shaka-player.ui.min.js"></script>
 
  <title>AK LIVE PLAYER - JStar M3U</title>
 
  <style>
    :root { --theme-color: #e50914; }
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; background:#000; overflow:hidden; font-family: 'Poppins', sans-serif; }
    .shaka-video-container { position:fixed; inset:0; background:#000; }
    video { width:100%; height:100%; object-fit:contain; background:#000; }
    
    #channel-list {
      position: absolute; top: 15px; left: 15px; z-index: 100;
      background: rgba(0,0,0,0.7); color: #fff; border: none; padding: 8px 12px;
      border-radius: 6px; font-size: 14px; max-width: 280px;
    }
    #debug-status {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      z-index: 50; color: #fff; background: rgba(20,20,20,0.95);
      padding: 15px 25px; font-size: 14px; border-radius: 8px;
      opacity: 0; visibility: hidden; text-align: center; transition: all 0.3s;
    }
    #debug-status.show { opacity: 1; visibility: visible; }
    #debug-status.error { border-bottom: 4px solid #ff4444; }
    #debug-status.success { border-bottom: 4px solid #00C851; }
  </style>
</head>
<body>
  <div class="shaka-video-container" id="player-container">
    <select id="channel-list"></select>
    <div id="debug-status" class="loading">Loading M3U Playlist...</div>
    <video id="video" autoplay playsinline preload="metadata"></video>
  </div>

  <script>
    const M3U_URL = "https://raw.githubusercontent.com/alex4528y/m3u/refs/heads/main/jstar.m3u";
    const statusEl = document.getElementById('debug-status');
    const channelSelect = document.getElementById('channel-list');

    function updateStatus(msg, type = 'info') {
      statusEl.innerHTML = msg;
      statusEl.className = `show ${type}`;
      console.log(`[${type.toUpperCase()}] ${msg}`);
    }

    // Simple M3U Parser for this playlist
    async function loadPlaylist() {
      try {
        updateStatus("Fetching JStar M3U Playlist...", "loading");
        const res = await fetch(M3U_URL);
        if (!res.ok) throw new Error("Failed to fetch M3U");
        
        const text = await res.text();
        const lines = text.split(/\r?\n/);
        const channels = [];
        let currentName = "";

        for (let i = 0; i < lines.length; i++) {
          const line = lines[i].trim();
          if (line.startsWith('#EXTINF:')) {
            currentName = line.split(',').pop().trim() || `Channel ${channels.length + 1}`;
          } 
          else if (line && !line.startsWith('#') && currentName) {
            channels.push({
              name: currentName,
              url: line
            });
            currentName = "";
          }
        }

        if (channels.length === 0) throw new Error("No channels found in playlist");

        // Populate dropdown
        channelSelect.innerHTML = '<option value="">Select Channel</option>';
        channels.forEach((ch, index) => {
          const opt = document.createElement('option');
          opt.value = index;
          opt.textContent = ch.name;
          channelSelect.appendChild(opt);
        });

        updateStatus(`Loaded ${channels.length} channels successfully!`, "success");
        setTimeout(() => statusEl.classList.remove('show'), 2000);

        // Play first channel by default
        if (channels.length > 0) {
          playChannel(channels[0].url, channels[0].name);
        }

        // Channel change handler
        channelSelect.addEventListener('change', () => {
          const idx = parseInt(channelSelect.value);
          if (!isNaN(idx)) {
            playChannel(channels[idx].url, channels[idx].name);
          }
        });

        return channels;
      } catch (e) {
        updateStatus(`Playlist Error: ${e.message}`, "error");
        console.error(e);
      }
    }

    async function playChannel(streamUrl, channelName) {
      updateStatus(`Loading: ${channelName}...`, "loading");

      const video = document.getElementById('video');
      if (window.player) window.player.destroy();

      window.player = new shaka.Player(video);
      const ui = new shaka.ui.Overlay(window.player, document.getElementById('player-container'), video);

      ui.configure({
        controlPanelElements: ["mute", "play_pause", "time_and_duration", "spacer", "quality", "picture_in_picture", "fullscreen"]
      });

      // Important configurations
      window.player.configure({
        streaming: { lowLatencyMode: true, bufferingGoal: 10 },
        drm: {
          // Clearkey support (most channels in this playlist use it)
          clearKeys: {}   // We'll handle via request filter if needed
        }
      });

      // Request Filter - Very Important for these links
      window.player.getNetworkingEngine().registerRequestFilter((type, request) => {
        request.headers['Referer'] = 'https://www.jiotv.com/';
        request.headers['User-Agent'] = 'Mozilla/5.0 (Linux; Android 13) AppleWebKit/537.36';
        request.headers['Origin'] = 'https://www.jiotv.com';
      });

      try {
        await window.player.load(streamUrl);
        video.play().catch(() => {});
        updateStatus(`Now Playing: ${channelName}`, "success");
        setTimeout(() => statusEl.classList.remove('show'), 2500);
      } catch (e) {
        console.error("Playback Error:", e);
        let msg = e.code ? `Code: ${e.code}` : e.message;
        updateStatus(`Playback Failed.<br>Code: ${msg}<br>Channel: ${channelName}`, "error");
      }
    }

    // Start everything
    document.addEventListener('DOMContentLoaded', () => {
      shaka.polyfill.installAll();
      loadPlaylist();
    });
  </script>
</body>
</html>
