<style>
    /* Bingewav Sports Logo Section */
    .logo-container {
      padding: 1px;
      border-radius: 10px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);

    .logo-container img {
      width: 220px;
      height: auto;

    :root {
      --bg-color: #121212;
      --text-color: #ffffff;
      --card-bg: #1e1e1e;
      --card-shadow: rgba(255, 255, 255, 0.1);
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      font-family: 'Roboto', sans-serif;
      margin: 0;
      flex-direction: column;
      align-items: center;
    }

    .match-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 2fr));
      gap: 20px;
      width: 100%;
      max-width: 1200px;
    }

    .match-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      background-color: var(--card-bg);
      border-radius: 10px;
      box-shadow: 0 4px 8px var(--card-shadow);
      text-align: center;
      transition: transform 0.3s, box-shadow 0.3s;
      position: relative; /* Added for LIVE badge positioning */
    }

    .match-card:hover {
      transform: scale(1.1);
      box-shadow: 0 6px 12px var(--card-shadow);
    }

    .match-card img {
      max-width: 95%;
      height: auto;
      border-radius: 10px;
      margin-bottom: 15px;
    }

    .match-title {
      font-size: 15px;
      font-weight: bold;
      margin-bottom: 5px;
    }

    .match-subtitle {
      font-size: 13px;
      color: #bbb;
      margin-bottom: 10px;
    }

    .button-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 15px;
      width: 100%;
      margin-top: 10px;
    }

    .watch-button {
      width: 110px;
      height: 35px;
      font-size: 14px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(to right, #77730a, #fff877, #73770a, #77770a, #fdff77, #77720a);
      background-size: 250%;
      background-position: left;
      color: #fdff77;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition-duration: 1s;
      overflow: hidden;
    }

    .watch-button::before {
      position: absolute;
      color: #fdff77;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 97%;
      height: 90%;
      border-radius: 8px;
      transition-duration: 1s;
      background-color: rgba(0, 0, 0, 0.842);
      background-size: 200%;
    }

    .watch-button.premium::before {
      content: "Watch Ad-Free";
    }

    .watch-button:hover::before {
      background-position: right;
      transition-duration: 1s;
    }

    .watch-button:hover {
      background-position: right;
      transition-duration: 1s;
    }

    .watch-button:active {
      transform: scale(0.95);
    }

    .live-badge {
      position: absolute;
      top: 10px;
      left: 10px;
      background-color: #e61c1c;
      color: white;
      font-size: 12px;
      font-weight: bold;
      text-transform: uppercase;
      padding: 4px 8px;
      border-radius: 5px;
      z-index: 10;
    }

    #popup {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.8);
      display: none; /* Initially hidden */
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .popup-content {
      background-color: #222;
      color: white;
      padding: 20px;
      text-align: center;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
      width: 300px;
    }

    .popup-content hh2 {
      margin: 0 0 10px;
      color: #42CDE7;
    }

    .popup-content p {
      margin: 0 0 20px;
    }

    .popup-content button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
    }

      background-color: #007BCB;
      color: white;
    }

    .popup-content .close-btn {
      background-color: #555;
      color: white;
    }

  <h5 class="header3" style="text-align: center;"><b> Fancode Live Matches </b><i class="fa fa-caret"
      style="margin-bottom:10px;color:#999"></i></h5> <br>

  <div class="match-container" id="matches"></div>

  <div id="popup">
    <div class="popup-content">

      <p>Join our Telegram channel @AK_LIVE_OFFICE for more updates.</p>

    </div>

  <script>
    let cachedMatches = null; // Cache JSON data

    async function fetchMatches() {
      try {
        const response = await fetch('https://raw.githubusercontent.com/drmlive/fancode-live-events/main/fancode.json');
        if (!response.ok) throw new Error(`HTTP error! Status: ${response.status}`);
        const data = await response.json();

        // Cache the matches
        console.log('Fetched JSON:', data);
        cachedMatches = data.matches || data || [];
        if (!cachedMatches.length) {
          console.error('No matches found in JSON:', data);
          alert('No matches available.');
          return;
        }

        const matchesContainer = document.getElementById('matches');
        matchesContainer.innerHTML = ''; // Clear container

        cachedMatches.forEach(match => {
          console.log('Rendering match with match_id:', match.match_id);
          const matchCard = document.createElement('div');
          matchCard.className = 'match-card';
          matchCard.innerHTML = `
            <img src="${match.src || 'placeholder.jpg'}" alt="Match Image">
            ${match.status === 'LIVE' ? `<span class="live-badge">LIVE</span>` : ''}
            <div class="match-title">${match.title || 'Untitled Match'}</div>
            <div class="match-subtitle">${match.event_category || 'Unknown'}</div>
            ${match.status === 'LIVE' ? `
              <div class="button-container">
                <button class="watch-button premium" onclick="redirect(${match.match_id}, true)"> </button>
              </div>
            ` : `<p>Starts at: ${match.startTime || 'Unknown Time'}</p>`}
          `;
          matchesContainer.appendChild(matchCard);
        });
      } catch (error) {
        console.error('Error fetching matches:', error);
        alert('Failed to load matches. Please try again.');
      }
    }

    async function redirect(matchId, premium) {
      try {
        // Convert matchId to string for comparison
        matchId = String(matchId);
        console.log('Redirect called with matchId:', matchId, 'premium:', premium);

        // Use cached data or fetch
        if (!cachedMatches) {
          const response = await fetch('https://raw.githubusercontent.com/drmlive/fancode-live-events/main/fancode.json');
          if (!response.ok) throw new Error(`HTTP error! Status: ${response.status}`);
          const data = await response.json();
          console.log('Fetched JSON for redirect:', data);
          cachedMatches = data.matches || data || [];
        }

        // Log all match IDs
        const matchIds = cachedMatches.map(m => String(m.match_id));
        console.log('Available match IDs:', matchIds);

        // Find match
        const match = cachedMatches.find(item => String(item.match_id) === matchId);
        if (!match) {
          console.error(`Match with ID ${matchId} not found. Available IDs:`, matchIds);
          alert(`Match with ID ${matchId} not found. Check console for available IDs.`);
          return;
        }

        // Use adfree_url
        const streamUrl = match.adfree_url;
        if (!streamUrl) {
          console.error('No adfree_url for match_id:', matchId, 'match:', match);
          alert('No premium stream URL available for this match.');
          return;
        }

        // Redirect to player
        const url = `https://m3u8player.org/player.html?url=${encodeURIComponent(streamUrl)}`;
        console.log('Redirecting to:', url);
        window.location.href = url;
      } catch (error) {
        console.error('Error in redirect:', error);
        alert('Failed to load match data. Please try again.');
      }
    }

    function closePopup() {
      const popup = document.getElementById("popup");
      if (popup) popup.style.display = "none";
    }

    window.onload = function () {
      setTimeout(() => {
        const popup = document.getElementById("popup");
        if (popup) popup.style.display = "flex";
      }, 3000);
      fetchMatches();
    };
  </script>
